<svg viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <style>
    .txt{fill:#1f2937;font-size:13px}
    .lbl{fill:#1f2937;font-size:14px;font-weight:700}
    .sub{fill:#5b6470;font-size:11px}
    .surf{fill:#eef2f7;stroke:#94a3b8;stroke-width:1.5}
    .acc{fill:#dbeafe;stroke:#2563eb;stroke-width:2}
    .blade{stroke:#2563eb;stroke-width:3;fill:none}
    .dim{stroke:#5b6470;stroke-width:1;fill:none}
    .arr{stroke:#2563eb;stroke-width:2.5;fill:none}
  </style>
  <defs>
    <pattern id="hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#94a3b8" stroke-width="1.4"/>
    </pattern>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#2563eb"/>
    </marker>
    <marker id="dl" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#5b6470"/></marker>
    <marker id="dr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="#5b6470"/></marker>
  </defs>

  <rect x="70" y="70" width="430" height="26" rx="3" fill="url(#hatch)" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="70" y="464" width="430" height="26" rx="3" fill="url(#hatch)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="285" y="60" text-anchor="middle" class="sub">Fixed base (Ground, monolithic frame)</text>

  <rect x="120" y="166" width="330" height="24" rx="3" class="surf"/>
  <text x="285" y="182" text-anchor="middle" class="txt">Intermediate stage</text>
  <rect x="120" y="370" width="330" height="24" rx="3" class="surf"/>
  <text x="285" y="386" text-anchor="middle" class="txt">Intermediate stage</text>

  <rect x="95" y="258" width="430" height="44" rx="4" class="acc"/>
  <text x="250" y="285" text-anchor="middle" class="lbl">Moving Stage (coil attached)</text>

  <path class="blade" d="M200,96 L200,166"/><path class="blade" d="M410,96 L410,166"/>
  <path class="blade" d="M200,190 L200,258"/><path class="blade" d="M410,190 L410,258"/>
  <path class="blade" d="M200,302 L200,370"/><path class="blade" d="M410,302 L410,370"/>
  <path class="blade" d="M200,394 L200,464"/><path class="blade" d="M410,394 L410,464"/>

  <path class="dim" d="M168,96 L168,166" marker-start="url(#dl)" marker-end="url(#dr)"/>
  <text x="160" y="135" text-anchor="end" class="sub">L</text>
  <path class="dim" d="M194,128 L206,128" marker-start="url(#dl)" marker-end="url(#dr)"/>
  <text x="200" y="120" text-anchor="middle" class="sub">t</text>
  <text x="118" y="232" class="sub">leaf blade x8</text>

  <rect x="540" y="262" width="40" height="36" rx="3" fill="#2563eb" opacity="0.85"/>
  <text x="560" y="316" text-anchor="middle" class="sub">coil</text>
  <rect x="585" y="246" width="70" height="68" rx="4" fill="url(#hatch)" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="598" y="256" width="44" height="22" rx="2" fill="#eef2f7" stroke="#94a3b8"/>
  <text x="620" y="271" text-anchor="middle" class="txt">N</text>
  <rect x="598" y="282" width="44" height="22" rx="2" fill="#eef2f7" stroke="#94a3b8"/>
  <text x="620" y="297" text-anchor="middle" class="txt">S</text>
  <text x="620" y="336" text-anchor="middle" class="sub">magnet + yoke (fixed)</text>
  <text x="655" y="230" text-anchor="middle" class="sub">VCM (Permeance)</text>

  <path class="arr" d="M300,330 L380,330" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="340" y="350" text-anchor="middle" class="lbl">X (1-DOF, &gt;1mm)</text>

  <g transform="translate(700,470)">
    <path class="arr" d="M0,0 L40,0" marker-end="url(#ah)"/>
    <path class="arr" d="M0,0 L0,-40" marker-end="url(#ah)"/>
    <text x="46" y="4" class="sub">X</text>
    <text x="-4" y="-46" text-anchor="middle" class="sub">Y</text>
    <text x="0" y="20" text-anchor="middle" class="sub">Z (height &lt;=20)</text>
  </g>

  <g transform="translate(70,512)">
    <rect x="0" y="0" width="16" height="12" class="acc"/>
    <text x="22" y="10" class="sub">Moving</text>
    <rect x="120" y="0" width="16" height="12" fill="url(#hatch)" stroke="#94a3b8"/>
    <text x="142" y="10" class="sub">Fixed</text>
    <line x1="240" y1="6" x2="260" y2="6" class="blade"/>
    <text x="266" y="10" class="sub">Leaf blade</text>
  </g>
</svg>
